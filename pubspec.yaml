name: india_green_app
description: "One App. Every Farmer. Every Partner. — IGO Group agritech super-app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Models & Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Environment
  flutter_dotenv: ^5.2.1

  # UI Components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2

  # Image Handling
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.2
  package_info_plus: ^8.2.1
  uuid: ^4.5.1
  collection: ^1.19.1

  # Fonts
  google_fonts: ^6.2.1
  supabase_flutter: ^2.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.6.3

  # Linting
  flutter_lints: ^5.0.0

  # Testing
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
